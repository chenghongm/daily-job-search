name: Daily Job Search

on:
  schedule:
    # 11:00 AM PST = 19:00 UTC (during PST / UTC-8)
    # 11:00 AM PDT = 18:00 UTC (during PDT / UTC-7)
    # Using 18:00 UTC to cover PDT (summer). Adjust to 19:00 in winter.
    - cron: "0 18 * * 1-5"   # Mon–Fri only

  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          SPREADSHEET_ID:      ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          CALENDAR_ID:         ${{ secrets.CALENDAR_ID }}
          SCORING_MODEL:       ${{ secrets.SCORING_MODEL }}
        run: python job_search.py